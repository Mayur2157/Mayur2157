name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily — avoids peak load times
  workflow_dispatch: {}    # manual trigger from Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Only install the two packages the daily job needs
      # (pillow / opencv / rembg are only needed locally for the portrait)
      - name: Install dependencies
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
